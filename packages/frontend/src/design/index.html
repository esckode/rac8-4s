<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>C U At Court — Design System</title>
<link rel="stylesheet" href="tokens.css" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  html, body { margin: 0; padding: 0; min-height: 100vh; }
  body { background: #f0eee9; }
  /* Density variants — applied to root, affect downstream tokens */
  html[data-density="cozy"]    { --pad-card: 14px; --pad-screen: 14px; }
  html[data-density="comfort"] { --pad-card: 20px; --pad-screen: 20px; }
  html[data-density="roomy"]   { --pad-card: 28px; --pad-screen: 28px; }

  /* Glass on/off */
  html[data-glass="off"] *[style*="backdrop-filter"] { backdrop-filter: none !important; }
  html[data-glass="off"] .uac-glass { background: var(--surface) !important; backdrop-filter: none !important; }

  /* Gradient mode — light mode flattens hero gradients */
  html[data-gradient="light"] .uac-grad-bg {
    background: var(--surface-tint) !important;
  }

  /* Dark mode token overrides */
  html[data-mode="dark"] {
    --surface: #141B2B;
    --surface-tint: #0F1626;
    --surface-sunken: #1B2336;
    --surface-glass: rgba(20, 27, 43, 0.7);
    --bg-app: radial-gradient(140% 100% at 0% 0%, #1B2747 0%, #0F1626 38%, #1E1A36 75%, #261A3A 100%);
    --ink-900: #F3F6FB;
    --ink-800: #E3E8F2;
    --ink-700: #C9D2E2;
    --ink-600: #A0AAC0;
    --ink-500: #818CA3;
    --ink-400: #5F6A80;
    --ink-300: #424D63;
    --ink-200: #2E384B;
    --ink-100: #232C3F;
    --ink-50:  #1B2336;
    --border: #2E384B;
    --border-soft: #232C3F;
    --border-strong: #424D63;
  }

  /* Palette swaps — override court/lavender to retune the system */
  html[data-palette="sunset"] {
    --court-50:  #FFF6F1; --court-100: #FFE9DC; --court-200: #FFD0B0;
    --court-300: #FFB489; --court-400: #FF9461; --court-500: #F27439;
    --court-600: #D55A20; --court-700: #A14418; --court-900: #5C2510;
    --lavender-100: #FFEEF7; --lavender-200: #FFC9E3; --lavender-300: #FFA5CD;
    --lavender-400: #ED7BB1; --lavender-500: #C95897; --lavender-700: #823266;
  }
  html[data-palette="garden"] {
    --court-50:  #F4FCF6; --court-100: #E5F7EB; --court-200: #BFEACC;
    --court-300: #94DAA9; --court-400: #66C685; --court-500: #41AB66;
    --court-600: #2D8B50; --court-700: #1F6638; --court-900: #0F3A20;
    --lavender-100: #FCFAE4; --lavender-200: #F4EAA7; --lavender-300: #EAD86A;
    --lavender-400: #C9B53A; --lavender-500: #9E8E26; --lavender-700: #665B14;
  }
  html[data-palette="berry"] {
    --court-50:  #FFF1F8; --court-100: #FFDCEB; --court-200: #FFB0D2;
    --court-300: #FF85B7; --court-400: #F25C95; --court-500: #D03775;
    --court-600: #A82156; --court-700: #771740; --court-900: #410922;
    --lavender-100: #F4ECFF; --lavender-200: #DCC6FA; --lavender-300: #C09FF1;
    --lavender-400: #9D72DE; --lavender-500: #7B4FC4; --lavender-700: #4E2D88;
  }
</style>

<template id="__bundler_thumbnail">
  <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <rect width="200" height="200" fill="#0F1B2E"/>
    <path d="M120 30 a70 70 0 1 0 0 140 a50 50 0 1 1 0 -100 z" fill="#A8D5FF"/>
    <path d="M120 60 a40 40 0 1 0 0 80 a22 22 0 1 1 0 -44 z" fill="#7BC3FF"/>
  </svg>
</template>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="../ui/lib.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="../ui/section-foundation.jsx"></script>
<script type="text/babel" src="../ui/section-components.jsx"></script>
<script type="text/babel" src="../ui/section-mobile.jsx"></script>
<script type="text/babel" src="../ui/section-auth.jsx"></script>
<script type="text/babel" src="../ui/section-organizer-mobile.jsx"></script>
<script type="text/babel" src="../ui/section-desktop.jsx"></script>
<script type="text/babel" src="../ui/section-landing.jsx"></script>

<script type="text/babel" data-presets="env,react">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "palette": "sky",
  "density": "comfort",
  "glass": true,
  "gradient": "heavy",
  "darkMode": false,
  "viewMode": "organizer"
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  // Apply tweaks to <html> so token overrides cascade everywhere.
  React.useEffect(() => {
    const html = document.documentElement;
    html.dataset.palette  = t.palette;
    html.dataset.density  = t.density;
    html.dataset.glass    = t.glass ? 'on' : 'off';
    html.dataset.gradient = t.gradient;
    html.dataset.mode     = t.darkMode ? 'dark' : 'light';
  }, [t]);

  return (
    <>
      <DesignCanvas>
        {/* ============== 01 · BRAND & FOUNDATIONS ============== */}
        <DCSection id="foundation" title="01 · Foundations" subtitle="Brand, color, type, shape — the system's roots.">
          <DCArtboard id="logo" label="Logo & mark" width={1080} height={1020}>
            <FoundationLogo />
          </DCArtboard>
          <DCArtboard id="color" label="Color system" width={1080} height={1500}>
            <FoundationColor />
          </DCArtboard>
          <DCArtboard id="type" label="Typography" width={1080} height={1160}>
            <FoundationType />
          </DCArtboard>
          <DCArtboard id="shape" label="Shape · space · light" width={1080} height={1060}>
            <FoundationShape />
          </DCArtboard>
          <DCArtboard id="layout" label="Layout & breakpoints" width={1080} height={1880}>
            <FoundationLayout />
          </DCArtboard>
        </DCSection>

        {/* ============== 02 · COMPONENTS ============== */}
        <DCSection id="components" title="02 · Components" subtitle="Buttons, forms, and the tournament-specific UI.">
          <DCArtboard id="buttons" label="Buttons & chips" width={1080} height={760}>
            <CompButtons />
          </DCArtboard>
          <DCArtboard id="forms" label="Forms & inputs" width={1080} height={1040}>
            <CompForms />
          </DCArtboard>
          <DCArtboard id="tournament-comp" label="Tournament components" width={1080} height={1440}>
            <CompTournament />
          </DCArtboard>
        </DCSection>

        {/* ============== 03 · MOBILE ============== */}
        <DCSection id="mobile" title="03 · Mobile app" subtitle="Phone-first. This is where most players live — courtside, mid-rally, one-thumb.">
          <DCArtboard id="m-landing" label="01 · Landing / auth" width={390} height={844}>
            <MobileLanding />
          </DCArtboard>
          <DCArtboard id="m-home" label="02 · Home / dashboard" width={390} height={844}>
            <MobileHome />
          </DCArtboard>
          <DCArtboard id="m-browse" label="03 · Browse tournaments" width={390} height={844}>
            <MobileBrowse />
          </DCArtboard>
          <DCArtboard id="m-detail" label="04 · Tournament detail / register" width={390} height={844}>
            <MobileTournamentDetail />
          </DCArtboard>
          <DCArtboard id="m-standings" label="05 · Live standings" width={390} height={844}>
            <MobileStandings />
          </DCArtboard>
          <DCArtboard id="m-score" label="06 · Submit score" width={390} height={844}>
            <MobileMatchScore />
          </DCArtboard>
          <DCArtboard id="m-bracket" label="07 · Live bracket" width={390} height={844}>
            <MobileBracket />
          </DCArtboard>
          <DCArtboard id="m-profile" label="08 · Player profile" width={390} height={844}>
            <MobileProfile />
          </DCArtboard>
        </DCSection>

        {/* ============== MOBILE APP AUTHENTICATION ============== */}
        <DCSection id="mobile-auth" title="Mobile app authentication" subtitle="Login, signup and password recovery — matched to the dark landing aesthetic.">
          <DCArtboard id="a-login" label="01 · Sign in" width={390} height={844}>
            <AuthLogin />
          </DCArtboard>
          <DCArtboard id="a-login-error" label="02 · Sign in · error" width={390} height={844}>
            <AuthLoginError />
          </DCArtboard>
          <DCArtboard id="a-signup" label="03 · Create account" width={390} height={844}>
            <AuthSignup />
          </DCArtboard>
          <DCArtboard id="a-forgot" label="04 · Forgot password" width={390} height={844}>
            <AuthForgotPassword />
          </DCArtboard>
          <DCArtboard id="a-forgot-sent" label="05 · Code sent" width={390} height={844}>
            <AuthForgotPasswordSent />
          </DCArtboard>
          <DCArtboard id="a-reset" label="06 · Reset password" width={390} height={844}>
            <AuthResetPassword />
          </DCArtboard>
        </DCSection>

        {/* ============== 04 · ORGANIZER (MOBILE) ============== */}
        <DCSection id="organizer-mobile" title="04 · Organizer (mobile)" subtitle="Phone-sized organizer tools — for the courtside half of running a tournament.">
          <DCArtboard id="om-overview" label="01 · Overview" width={390} height={844}>
            <MobileOrgOverview />
          </DCArtboard>
          <DCArtboard id="om-live" label="02 · Live monitor" width={390} height={844}>
            <MobileOrgLiveMonitor />
          </DCArtboard>
          <DCArtboard id="om-override" label="03 · Resolve dispute" width={390} height={844}>
            <MobileOrgOverride />
          </DCArtboard>
          <DCArtboard id="om-broadcast" label="04 · Broadcast push" width={390} height={844}>
            <MobileOrgBroadcast />
          </DCArtboard>
          <DCArtboard id="om-checkin" label="05 · Check-in / roster" width={390} height={844}>
            <MobileOrgCheckIn />
          </DCArtboard>
        </DCSection>

        {/* ============== 05 · ORGANIZER (DESKTOP) ============== */}
        <DCSection id="organizer" title="05 · Organizer (desktop)" subtitle="Tournaments are easier to run on a big screen. Same design language, more density.">
          <DCArtboard id="d-dash" label="01 · Organizer dashboard" width={1280} height={820}>
            <DesktopDashboard />
          </DCArtboard>
          <DCArtboard id="d-create" label="02 · Create tournament wizard" width={1280} height={820}>
            <DesktopCreateTournament />
          </DCArtboard>
          <DCArtboard id="d-bracket" label="03 · Bracket review / publish" width={1280} height={820}>
            <DesktopBracketReview />
          </DCArtboard>
          <DCArtboard id="d-monitor" label="04 · Live monitor" width={1280} height={820}>
            <DesktopLiveMonitor />
          </DCArtboard>
        </DCSection>

        {/* ============== 06 · MARKETING ============== */}
        <DCSection id="marketing" title="06 · Marketing site" subtitle="The first impression for clubs and organizers.">
          <DCArtboard id="landing" label="Landing page" width={1280} height={2820}>
            <Landing />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksPanel title="Tweaks">
        <TweakSection label="Theme" />
        <TweakRadio
          label="Palette" value={t.palette}
          options={['sky','sunset','garden','berry']}
          onChange={(v) => setTweak('palette', v)}
        />
        <TweakToggle
          label="Dark mode" value={t.darkMode}
          onChange={(v) => setTweak('darkMode', v)}
        />

        <TweakSection label="Surface" />
        <TweakRadio
          label="Density" value={t.density}
          options={['cozy','comfort','roomy']}
          onChange={(v) => setTweak('density', v)}
        />
        <TweakToggle
          label="Glass effects" value={t.glass}
          onChange={(v) => setTweak('glass', v)}
        />
        <TweakRadio
          label="Gradients" value={t.gradient}
          options={['light','heavy']}
          onChange={(v) => setTweak('gradient', v)}
        />

        <TweakSection label="Role" />
        <TweakRadio
          label="View as" value={t.viewMode}
          options={['player','organizer']}
          onChange={(v) => setTweak('viewMode', v)}
        />
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
