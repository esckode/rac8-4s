<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>C U At Court — Design System</title>
<style>
  html, body { margin: 0; padding: 0; min-height: 100vh; }
  body { background: #f0eee9; font-family: system-ui, -apple-system, sans-serif; }
  #root { width: 100%; height: 100%; }

  /* Density variants */
  html[data-density="cozy"]    { --pad-card: 14px; --pad-screen: 14px; }
  html[data-density="comfort"] { --pad-card: 20px; --pad-screen: 20px; }
  html[data-density="roomy"]   { --pad-card: 28px; --pad-screen: 28px; }

  /* Glass on/off */
  html[data-glass="off"] *[style*="backdrop-filter"] { backdrop-filter: none !important; }
  html[data-glass="off"] .uac-glass { background: var(--surface) !important; backdrop-filter: none !important; }

  /* Gradient mode */
  html[data-gradient="light"] .uac-grad-bg {
    background: var(--surface-tint) !important;
  }

  /* Dark mode token overrides */
  html[data-mode="dark"] {
    --surface: #141B2B;
    --surface-tint: #0F1626;
    --surface-sunken: #1B2336;
    --surface-glass: rgba(20, 27, 43, 0.7);
    --bg-app: radial-gradient(140% 100% at 0% 0%, #1B2747 0%, #0F1626 38%, #1E1A36 75%, #261A3A 100%);
    --ink-900: #F3F6FB;
    --ink-800: #E3E8F2;
    --ink-700: #C9D2E2;
    --ink-600: #A0AAC0;
    --ink-500: #818CA3;
    --ink-400: #5F6A80;
    --ink-300: #424D63;
    --ink-200: #2E384B;
    --ink-100: #232C3F;
    --ink-50:  #1B2336;
    --border: #2E384B;
    --border-soft: #232C3F;
    --border-strong: #424D63;
  }

  /* Palette swaps */
  html[data-palette="sunset"] {
    --court-50:  #FFF6F1; --court-100: #FFE9DC; --court-200: #FFD0B0;
    --court-300: #FFB489; --court-400: #FF9461; --court-500: #F27439;
    --court-600: #D55A20; --court-700: #A14418; --court-900: #5C2510;
    --lavender-100: #FFEEF7; --lavender-200: #FFC9E3; --lavender-300: #FFA5CD;
    --lavender-400: #ED7BB1; --lavender-500: #C95897; --lavender-700: #823266;
  }
  html[data-palette="garden"] {
    --court-50:  #F4FCF6; --court-100: #E5F7EB; --court-200: #BFEACC;
    --court-300: #94DAA9; --court-400: #66C685; --court-500: #41AB66;
    --court-600: #2D8B50; --court-700: #1F6638; --court-900: #0F3A20;
    --lavender-100: #FCFAE4; --lavender-200: #F4EAA7; --lavender-300: #EAD86A;
    --lavender-400: #C9B53A; --lavender-500: #9E8E26; --lavender-700: #665B14;
  }
  html[data-palette="berry"] {
    --court-50:  #FFF1F8; --court-100: #FFDCEB; --court-200: #FFB0D2;
    --court-300: #FF85B7; --court-400: #F25C95; --court-500: #D03775;
    --court-600: #A82156; --court-700: #771740; --court-900: #410922;
    --lavender-100: #F4ECFF; --lavender-200: #DCC6FA; --lavender-300: #C09FF1;
    --lavender-400: #9D72DE; --lavender-500: #7B4FC4; --lavender-700: #4E2D88;
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="module" src="/src/design-app.jsx"></script>
</body>
</html>
