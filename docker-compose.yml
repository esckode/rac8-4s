services:
  postgres:
    image: postgres:15-alpine
    container_name: tournament_app_postgres
    environment:
      POSTGRES_DB: tournament_app
      POSTGRES_USER: tournament_user
      POSTGRES_PASSWORD: tournament_pass
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      # Named volume for persistent data across container restarts
      - postgres_data:/var/lib/postgresql/data
      # Initialization script
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tournament_user -d tournament_app"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - tournament_network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: tournament_app_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - tournament_network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  tournament_network:
    driver: bridge
