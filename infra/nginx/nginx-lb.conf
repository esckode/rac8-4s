# nginx reverse proxy — non-sticky round-robin load balancer for the distributed dev stack.
# Forwards to two API instances (:3001 and :3002) with SSE-safe settings.
#
# Key settings for SSE (Server-Sent Events):
#   proxy_buffering off       — prevents nginx from buffering the SSE response
#   proxy_read_timeout 3600   — keep SSE connections alive for up to 1 hour
#   chunked_transfer_encoding — required for streaming responses
#
# Default round_robin (no ip_hash / sticky) so requests hit both instances,
# which is exactly what the multi-instance tests need.

upstream api_instances {
    # Round-robin (default) — non-sticky so cross-instance bugs surface immediately.
    server host.docker.internal:3001;
    server host.docker.internal:3002;
}

server {
    listen 4000;

    location / {
        proxy_pass http://api_instances;
        proxy_http_version 1.1;

        # Headers
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        '';

        # SSE: disable buffering so events flow through immediately
        proxy_buffering             off;
        proxy_cache                 off;
        proxy_read_timeout          3600s;
        proxy_connect_timeout       10s;
        proxy_send_timeout          3600s;

        # Required for chunked/streaming responses
        chunked_transfer_encoding on;
    }
}
